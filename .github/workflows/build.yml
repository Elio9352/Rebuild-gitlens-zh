name: Fix gitlens and build

on:
    schedule:
        - cron: '0 0 * * *'
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version (e.g., v17.8.1). Leave empty for latest'
                required: false
                type: string

jobs:
    sync-release:
        name: Sync Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-tags: true
                fetch-depth: 0

            - name: Check if tag exists locally
              id: check_tag
              run: |
                  if [ -n "${{ github.event.inputs.version }}" ]; then
                      VERSION="${{ github.event.inputs.version }}"
                  else
                      VERSION=$(curl -s https://api.github.com/repos/gitkraken/vscode-gitlens/releases/latest | grep '"tag_name":' | cut -d'"' -f4)
                      echo "Latest version: $VERSION"
                  fi
                  echo "VERSION=$VERSION" >> $GITHUB_ENV

                  if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
                      echo "Tag exists..."
                      echo "exists=true" >> $GITHUB_OUTPUT
                      echo "exists=true"
                  else
                      echo "exists=false" >> $GITHUB_OUTPUT
                      echo "exists=false"
                  fi

            - name: Setup node
              if: steps.check_tag.outputs.exists == 'false'
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Setup pnpm
              if: steps.check_tag.outputs.exists == 'false'
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Exit if tag exists
              if: steps.check_tag.outputs.exists == 'true'
              run: |
                  echo "Tag ${{ env.VERSION }} already exists, exiting."
                  exit 0

            - name: Fetch upstream release
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  git fetch https://github.com/gitkraken/vscode-gitlens.git refs/tags/${{ env.VERSION }}:refs/tags/${{ env.VERSION }} --depth=1

            - name: Checkout upstream release
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  git checkout ${{ env.VERSION }}

            - name: 拉取patches
              if: steps.check_tag.outputs.exists == 'false'
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.repository }}
                  ref: ${{ github.ref }}
                  path: source-repo
                  sparse-checkout: |
                    patches
                    scripts/localize
                  sparse-checkout-cone-mode: false

            - name: Apply patches
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  echo "Applying patches..."
                  for patch in source-repo/patches/*.patch; do
                      if [ -f "$patch" ]; then
                          echo "Applying patch: $patch"
                          git apply "$patch" || echo "Failed to apply $patch"
                      fi
                  done

            - name: Prepare localization scripts
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  cp -r source-repo/scripts/localize "$RUNNER_TEMP/localize"

            - name: Code formating
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  pnpm install --save-dev -w prettier @prettier/plugin-oxc
                  npx prettier --write src/plus/gk/utils/checkin.utils.ts

            - name: Remove source-repo
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  rm -rf source-repo

            - name: Install dependencies
              if: steps.check_tag.outputs.exists == 'false'
              run: pnpm install

            - name: Package extension
              if: steps.check_tag.outputs.exists == 'false'
              run: pnpm package

            - name: Get package name
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  echo "PACKAGE_NAME=$(node -e "console.log(require('./package.json').name + '-' + require('./package.json').version + '.vsix')")" >> $GITHUB_ENV
                  echo "PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")" >> $GITHUB_ENV
                  echo "LOCALIZED_PACKAGE_NAME=gitlens-$(node -e "console.log(require('./package.json').version)")-zh-CN.vsix" >> $GITHUB_ENV

            - name: Localize extension
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  GITLENS_VERSION: ${{ env.PACKAGE_VERSION }}
              run: |
                  set -o pipefail
                  echo "Localizing ${{ env.PACKAGE_NAME }} -> ${{ env.LOCALIZED_PACKAGE_NAME }}"
                  node "$RUNNER_TEMP/localize/localize-gitlens-vsix.mjs" | tee -a "$GITHUB_STEP_SUMMARY"

            - name: Verify localized package
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  test -s "./${{ env.LOCALIZED_PACKAGE_NAME }}"
                  unzip -t "./${{ env.LOCALIZED_PACKAGE_NAME }}" > /dev/null
                  unzip -p "./${{ env.LOCALIZED_PACKAGE_NAME }}" extension/package.json | node -e "
                      let data = '';
                      process.stdin.on('data', c => (data += c));
                      process.stdin.on('end', () => {
                          const pkg = JSON.parse(data);
                          if (!/[一-龥]/.test(pkg.description)) {
                              console.error('Localization check failed: description is not Chinese');
                              process.exit(1);
                          }
                          console.log('Localization verified:', pkg.description);
                      });
                  "
                  unzip -Z1 "./${{ env.PACKAGE_NAME }}" | sort > "$RUNNER_TEMP/original-entries.txt"
                  unzip -Z1 "./${{ env.LOCALIZED_PACKAGE_NAME }}" | sort > "$RUNNER_TEMP/localized-entries.txt"
                  MISSING=$(comm -23 "$RUNNER_TEMP/original-entries.txt" "$RUNNER_TEMP/localized-entries.txt")
                  if [ -n "$MISSING" ]; then
                      echo "Localized package is missing entries:"
                      echo "$MISSING"
                      exit 1
                  fi
                  echo "All $(wc -l < "$RUNNER_TEMP/original-entries.txt" | tr -d ' ') original entries present in localized package"

            - name: Generate Changelog
              if: steps.check_tag.outputs.exists == 'false'
              id: changelog
              uses: mindsers/changelog-reader-action@v2
              with:
                  version: ${{ env.PACKAGE_VERSION }}
                  path: ./CHANGELOG.md

            - name: Create GitHub release
              if: steps.check_tag.outputs.exists == 'false'
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
              with:
                  tag_name: ${{ env.VERSION }}
                  name: GitLens ${{ env.PACKAGE_VERSION }}
                  body: ${{ steps.changelog.outputs.changes }}
                  draft: false
                  prerelease: false
                  files: |
                      ./${{ env.PACKAGE_NAME }}
                      ./${{ env.LOCALIZED_PACKAGE_NAME }}
